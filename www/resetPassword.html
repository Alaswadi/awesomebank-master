<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1>Reset Password</h1>
          <p>Change your account password</p>
        </div>
      </header>

      <div class="page-content">
        <div style="max-width:480px;">

          <div id="alert-box" style="display:none;" class="alert mb-16"></div>

          <!-- Step 1: Request Token -->
          <div class="card mb-16" id="step1-card">
            <h2 style="font-size:16px;font-weight:700;color:var(--primary);margin-bottom:20px;">
              <i class="fas fa-key" style="margin-right:8px;color:var(--accent);"></i>
              Step 1 — Get Reset Token
            </h2>
            <div class="form-group">
              <label class="form-label">Username</label>
              <div class="form-input-wrapper">
                <i class="fas fa-user form-input-icon"></i>
                <input class="form-input has-icon" type="text" id="req-username" placeholder="Enter your username">
              </div>
            </div>
            <button onclick="requestToken()" class="btn btn-accent btn-full btn-lg">
              <i class="fas fa-paper-plane"></i> Request Reset Token
            </button>
            <div id="token-display" style="display:none;margin-top:16px;padding:12px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac;">
              <p style="font-size:13px;color:#166534;margin-bottom:8px;font-weight:600;">Token generated. Use the link below:</p>
              <code id="reset-link" style="font-size:12px;word-break:break-all;color:#15803d;"></code>
            </div>
          </div>

          <!-- Step 2: Reset using URL params (the vulnerable flow) -->
          <div class="card mb-16">
            <h2 style="font-size:16px;font-weight:700;color:var(--primary);margin-bottom:20px;">
              <i class="fas fa-lock-open" style="margin-right:8px;color:var(--accent);"></i>
              Step 2 — Reset Password
            </h2>
            <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">
              Enter your credentials. The reset request will include your old password in the URL.
            </p>

            <form id="reset-form" onsubmit="resetPassword(event)">
              <div class="form-group">
                <label class="form-label">Username</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-user form-input-icon"></i>
                  <input class="form-input has-icon" type="text" id="username" placeholder="Your username" required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Reset Token</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-ticket-alt form-input-icon"></i>
                  <input class="form-input has-icon" type="text" id="token" placeholder="Paste your reset token" required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Old Password</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-lock form-input-icon"></i>
                  <input class="form-input has-icon" type="password" id="old-password" placeholder="Current password" required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-key form-input-icon"></i>
                  <input class="form-input has-icon" type="password" id="new-password" placeholder="New password" required>
                </div>
              </div>

              <button type="submit" id="reset-btn" class="btn btn-accent btn-full btn-lg">
                <i class="fas fa-check"></i> Reset Password
              </button>
            </form>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    // Pre-fill from URL params if arriving via a reset link
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('token'))    document.getElementById('token').value    = params.get('token');
      if (params.get('username')) document.getElementById('username').value = params.get('username');
    });

    async function requestToken() {
      const username = document.getElementById('req-username').value.trim();
      if (!username) { showAlert('Please enter a username.', 'danger'); return; }

      const token = localStorage.getItem('token');
      const res   = await fetch('resetPassword.php', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body:    JSON.stringify({ username })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('reset-link').textContent =
          window.location.origin + '/resetPassword.html?' + data.reset_url.split('?')[1];
        document.getElementById('token-display').style.display = 'block';
      } else {
        showAlert(data.message || 'Failed to generate token', 'danger');
      }
    }

    async function resetPassword(event) {
      event.preventDefault();
      const username    = document.getElementById('username').value;
      const token       = document.getElementById('token').value;
      const oldPassword = document.getElementById('old-password').value;
      const newPassword = document.getElementById('new-password').value;
      const btn         = document.getElementById('reset-btn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

      // VULNERABLE: old_password is sent as a GET parameter — it will appear in server logs,
      // browser history, and any Referer headers sent to third-party resources.
      const url = `resetPassword.php?token=${encodeURIComponent(token)}&username=${encodeURIComponent(username)}&old_password=${encodeURIComponent(oldPassword)}&new_password=${encodeURIComponent(newPassword)}`;

      try {
        const authToken = localStorage.getItem('token');
        const res  = await fetch(url, {
          method:  'GET',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();

        if (res.ok) {
          showAlert(data.message || 'Password reset successful!', 'success');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showAlert(data.message || 'Reset failed', 'danger');
        }
      } catch (err) {
        showAlert('Request failed: ' + err.message, 'danger');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
      }
    }

    function showAlert(message, type) {
      const el = document.getElementById('alert-box');
      el.className = `alert alert-${type} mb-16`;
      el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i> ${message}`;
      el.style.display = 'flex';
    }

    window.onload = () => initPage(() => {});
  </script>
</body>
</html>
