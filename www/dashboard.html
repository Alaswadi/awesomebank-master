<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle">Welcome back!</p>
        </div>
        <div class="top-bar-actions">
          <span id="role-badge" class="badge badge-accent"></span>
        </div>
      </header>

      <div class="page-content">
        <!-- Welcome Banner -->
        <div class="welcome-banner fade-in">
          <div class="welcome-title" id="welcome-title">Good day!</div>
          <div class="welcome-subtitle">Here's what's happening with your account today.</div>
        </div>

        <!-- Quick Actions -->
        <div class="mb-24">
          <div class="section-title">Quick Actions</div>
          <div class="quick-actions-grid" id="quick-actions">
            <!-- Dynamically populated -->
          </div>
        </div>

        <!-- Info Card -->
        <div class="card fade-in">
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-chart-line"></i></div>
            <div class="empty-state-title">Your financial overview</div>
            <div class="empty-state-text">Use the sidebar or quick actions above to navigate your banking features.</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    const QA_ICONS = {
      'Dashboard':       { icon: 'fa-home',          color: '#eef0fb', fg: '#5469d4' },
      'My Accounts':     { icon: 'fa-wallet',         color: '#e6f7f6', fg: '#09b09d' },
      'Money Transfer':  { icon: 'fa-paper-plane',    color: '#fef0f0', fg: '#e5424d' },
      'Statements':      { icon: 'fa-file-alt',       color: '#fef9ee', fg: '#e8a838' },
      'Credit Card':     { icon: 'fa-credit-card',    color: '#f3eeff', fg: '#8b5cf6' },
      'Bill Payment':    { icon: 'fa-receipt',        color: '#fef0f0', fg: '#e5424d' },
      '2FA Settings':    { icon: 'fa-shield-alt',     color: '#e6f7f6', fg: '#09b09d' },
      'Edit Profile':    { icon: 'fa-user-edit',      color: '#eef0fb', fg: '#5469d4' },
      'Manage Accounts': { icon: 'fa-university',     color: '#eef0fb', fg: '#5469d4' },
      'Manage Users':    { icon: 'fa-users',          color: '#f3eeff', fg: '#8b5cf6' },
      'Exchange Rates':  { icon: 'fa-exchange-alt',   color: '#fef9ee', fg: '#e8a838' },
      'Upload Pictures': { icon: 'fa-cloud-upload-alt',color:'#e6f7f6', fg: '#09b09d' },
      'System Settings': { icon: 'fa-cog',            color: '#f0f2f7', fg: '#6b7194' },
    };

    window.onload = () => initPage((user) => {
      document.getElementById('page-subtitle').textContent = `Welcome back, ${user.username}!`;
      document.getElementById('welcome-title').textContent = `Welcome back, ${user.username}! 👋`;
      document.getElementById('role-badge').textContent = user.role === 'admin' ? 'Administrator' : 'Customer';

      const menu = user.role === 'admin' ? ADMIN_MENU : CUSTOMER_MENU(user.user_id);
      const qaEl = document.getElementById('quick-actions');
      qaEl.innerHTML = menu.filter(m => m.id !== 'dashboard').map(item => {
        const q = QA_ICONS[item.label] || { icon: 'fa-circle', color: '#eef0fb', fg: '#5469d4' };
        return `
          <a href="${item.href}" class="quick-action-btn">
            <div class="qa-icon" style="background:${q.color};color:${q.fg}">
              <i class="fas ${q.icon}"></i>
            </div>
            <span class="qa-label">${item.label}</span>
          </a>`;
      }).join('');
    });
  </script>
</body>
</html>
