<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Pictures — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1>Upload Pictures</h1>
          <p>Upload images for the website banner</p>
        </div>
      </header>

      <div class="page-content">
        <div style="max-width:480px;">

          <div id="message" style="display:none;" class="alert mb-16"></div>

          <div class="card">
            <div class="card-title mb-4"><i class="fas fa-cloud-upload-alt" style="margin-right:8px;color:var(--accent);"></i>Image Upload</div>
            <div class="card-subtitle mb-16">Accepted formats: JPEG, PNG, GIF</div>

            <form id="upload-form" action="uploadPictures.php" method="POST" enctype="multipart/form-data">
              <div class="form-group">
                <label class="form-label">Select Image File</label>
                <div style="border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;transition:border-color var(--transition);" id="drop-zone">
                  <div style="font-size:40px;color:var(--muted);margin-bottom:12px;"><i class="fas fa-image"></i></div>
                  <div style="font-size:14px;font-weight:500;color:var(--primary);margin-bottom:4px);">Choose a file</div>
                  <div style="font-size:12.5px;color:var(--muted);margin-bottom:16px;">JPEG, PNG, or GIF up to 10MB</div>
                  <input class="form-input" type="file" name="file" id="file" accept="image/jpeg,image/png,image/gif" onchange="validateFile(event)" required style="width:auto;">
                </div>
              </div>

              <div id="file-preview" style="display:none;" class="mb-16">
                <img id="preview-img" style="max-width:100%;border-radius:var(--radius);border:1px solid var(--border);" alt="Preview">
              </div>

              <button class="btn btn-accent btn-full btn-lg" type="submit">
                <i class="fas fa-upload"></i> Upload Image
              </button>
            </form>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    function validateFile(event) {
      const fileInput = event.target;
      const file = fileInput.files[0];
      const msgEl = document.getElementById('message');

      if (!file) return false;

      const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
      if (!validTypes.includes(file.type)) {
        msgEl.className = 'alert alert-danger mb-16';
        msgEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Only image files (JPEG, PNG, GIF) are allowed!';
        msgEl.style.display = 'flex';
        fileInput.value = '';
        document.getElementById('file-preview').style.display = 'none';
        return false;
      }

      msgEl.style.display = 'none';

      // Show preview
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('file-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
      return true;
    }

    window.onload = () => initPage(() => {});
  </script>
</body>
</html>
