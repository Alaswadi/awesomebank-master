<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Accounts — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1>My Accounts</h1>
          <p>View and manage your bank accounts</p>
        </div>
      </header>

      <div class="page-content">
        <div id="alert-box" style="display:none;" class="alert alert-danger mb-16"></div>

        <!-- Loading -->
        <div id="loading-state" class="card flex-center" style="min-height:200px;">
          <div style="text-align:center;">
            <div class="spinner" style="margin:0 auto 14px;"></div>
            <p class="text-muted">Loading your accounts...</p>
          </div>
        </div>

        <!-- Accounts Grid -->
        <div id="accounts-grid" class="grid-3" style="display:none;"></div>

        <!-- Empty State -->
        <div id="empty-state" class="card" style="display:none;">
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
            <div class="empty-state-title">No Accounts Found</div>
            <div class="empty-state-text">You don't have any accounts yet. Please contact support to open an account.</div>
            <a href="dashboard.html" class="btn btn-accent mt-16">Back to Dashboard</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    const GRAD_CLASSES = ['checking', 'savings', 'investment', 'business'];

    function getGradClass(accountType, index) {
      const type = (accountType || '').toLowerCase();
      if (GRAD_CLASSES.includes(type)) return type;
      return GRAD_CLASSES[index % GRAD_CLASSES.length];
    }

    async function loadAccounts(user) {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user_id') || user.user_id;

      if (!userId) {
        showAlert('User ID not provided!');
        return;
      }

      try {
        const response = await fetch(`accountOverview.php?user_id=${userId}`);
        const accounts = await response.json();

        if (response.ok && Array.isArray(accounts) && accounts.length > 0) {
          displayAccounts(accounts, user.user_id);
        } else {
          document.getElementById('loading-state').style.display = 'none';
          document.getElementById('empty-state').style.display = 'block';
        }
      } catch (err) {
        showAlert('An error occurred while loading accounts.');
      }
    }

    function displayAccounts(accounts, userId) {
      document.getElementById('loading-state').style.display = 'none';
      const grid = document.getElementById('accounts-grid');
      grid.style.display = 'grid';

      grid.innerHTML = accounts.map((account, i) => {
        const balance = parseFloat(account.balance) || 0;
        const gradClass = getGradClass(account.account_type, i);
        return `
          <div class="account-gradient-card ${gradClass} fade-in" style="animation-delay:${i * 0.08}s">
            <div class="agc-type"><i class="fas fa-wallet" style="margin-right:6px;"></i>${account.account_type || 'Account'}</div>
            <div class="agc-balance-label">Available Balance</div>
            <div class="agc-balance">${formatCurrency(balance)}</div>
            <div class="agc-id">Account #${account.account_id}</div>
            <div class="agc-actions">
              <a href="moneyTransfer.html?user_id=${userId}" class="agc-btn agc-btn-primary">
                <i class="fas fa-paper-plane"></i> Transfer
              </a>
              <a href="customerStatement.html?account_id=${account.account_id}" class="agc-btn agc-btn-secondary">
                <i class="fas fa-file-alt"></i> Statement
              </a>
            </div>
          </div>`;
      }).join('');
    }

    function showAlert(message) {
      document.getElementById('loading-state').style.display = 'none';
      const el = document.getElementById('alert-box');
      el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
      el.style.display = 'flex';
    }

    window.onload = () => initPage(loadAccounts);
  </script>
</body>
</html>
