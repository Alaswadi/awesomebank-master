<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Transfer — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1>Money Transfer</h1>
          <p>Send money securely to any account</p>
        </div>
      </header>

      <div class="page-content">
        <div style="max-width:560px;">

          <div id="alert-box" style="display:none;" class="alert mb-16"></div>

          <!-- Transfer Form -->
          <div id="transfer-form">
            <!-- Balance Card -->
            <div class="account-gradient-card checking mb-20">
              <div class="agc-type"><i class="fas fa-university" style="margin-right:6px;"></i>From Account</div>
              <div class="agc-balance-label">Available Balance</div>
              <div class="agc-balance" id="balance-info">Loading...</div>
              <div class="agc-id" id="from-account-display">Account #—</div>
            </div>

            <div class="card">
              <div class="card-title mb-16"><i class="fas fa-paper-plane" style="margin-right:8px;color:var(--accent);"></i>Transfer Details</div>

              <div class="form-group">
                <label class="form-label">Recipient Account ID</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-user form-input-icon"></i>
                  <input type="text" id="to-account" class="form-input has-icon" placeholder="Enter recipient account ID" required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Amount (USD)</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-dollar-sign form-input-icon"></i>
                  <input type="number" id="amount" class="form-input has-icon" placeholder="0.00" min="0.01" step="0.01" required style="font-size:18px;font-weight:600;">
                </div>
              </div>

              <input type="hidden" id="from-account">
              <button class="btn btn-accent btn-full btn-lg" onclick="transferFunds()">
                <i class="fas fa-paper-plane"></i> Transfer Now
              </button>
            </div>
          </div>

          <!-- Success State -->
          <div id="success-state" class="card" style="display:none;">
            <div class="success-state">
              <div class="success-icon-circle"><i class="fas fa-check"></i></div>
              <div class="success-title">Transfer Successful!</div>
              <div class="success-message" id="success-message">Your money has been sent.</div>
            </div>
            <div class="detail-list mt-16" id="transfer-details"></div>
            <button class="btn btn-secondary btn-full mt-16" onclick="resetForm()">
              <i class="fas fa-redo"></i> Make Another Transfer
            </button>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <span class="loading-text">Processing your transfer...</span>
  </div>

  <script src="app.js"></script>
  <script>
    let userId;

    async function fetchAccountDetails(user) {
      userId = user.user_id;
      const params = new URLSearchParams(window.location.search);
      const uid = params.get('user_id') || userId;

      try {
        const response = await fetch(`accountOverview.php?user_id=${uid}`);
        const data = await response.json();

        if (response.ok && Array.isArray(data) && data.length > 0) {
          const account = data[0];
          document.getElementById('from-account-display').textContent = `Account #${account.account_id}`;
          document.getElementById('balance-info').textContent = formatCurrency(account.balance);
          document.getElementById('from-account').value = account.account_id;
        } else {
          showAlert('No account found for this user.', 'danger');
        }
      } catch (err) {
        showAlert('An error occurred while loading account details.', 'danger');
      }
    }

    async function transferFunds() {
      const fromAccount = document.getElementById('from-account').value;
      const toAccount   = document.getElementById('to-account').value;
      const amount      = document.getElementById('amount').value;

      if (!fromAccount || !toAccount || !amount) {
        showAlert('Please fill in all fields.', 'danger'); return;
      }
      if (parseFloat(amount) <= 0) {
        showAlert('Please enter a valid amount greater than 0.', 'danger'); return;
      }

      document.getElementById('loading-overlay').style.display = 'flex';

      try {
        const response = await fetch('moneyTransfer.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from_account_id: fromAccount, to_account_id: toAccount, amount })
        });
        const data = await response.json();
        document.getElementById('loading-overlay').style.display = 'none';

        if (response.ok) {
          showSuccess(data);
        } else {
          showAlert(data.message || 'Failed to transfer funds.', 'danger');
        }
      } catch (err) {
        document.getElementById('loading-overlay').style.display = 'none';
        showAlert('An unexpected error occurred. Please try again.', 'danger');
      }
    }

    function showSuccess(data) {
      document.getElementById('transfer-form').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      document.getElementById('success-message').textContent = `Money sent to ${data.recipient_name || 'the recipient'}.`;
      document.getElementById('transfer-details').innerHTML = `
        <div class="detail-row"><span class="detail-label">Amount Transferred</span><span class="detail-value text-success">${formatCurrency(data.amount || document.getElementById('amount').value)}</span></div>
        <div class="detail-row"><span class="detail-label">Recipient</span><span class="detail-value">${data.recipient_name || 'Unknown'}</span></div>
        <div class="detail-row"><span class="detail-label">Your New Balance</span><span class="detail-value">${formatCurrency(data.your_balance || 0)}</span></div>
      `;
    }

    function resetForm() {
      document.getElementById('transfer-form').style.display = 'block';
      document.getElementById('success-state').style.display = 'none';
      document.getElementById('to-account').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('alert-box').style.display = 'none';
      fetchAccountDetails({ user_id: userId });
    }

    function showAlert(message, type) {
      const el = document.getElementById('alert-box');
      el.className = `alert alert-${type} mb-16`;
      el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
      el.style.display = 'flex';
    }

    window.onload = () => initPage(fetchAccountDetails);
  </script>
</body>
</html>
