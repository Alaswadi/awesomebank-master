<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — AwesomeBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-title">
          <h1>Edit Profile</h1>
          <p>Update your account information</p>
        </div>
      </header>

      <div class="page-content">
        <div style="max-width:480px;">

          <div id="alert-box" style="display:none;" class="alert mb-16"></div>

          <!-- Profile Card -->
          <div class="card mb-16">
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
              <div style="width:56px;height:56px;background:linear-gradient(135deg,#5469d4,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:700;" id="profile-avatar">?</div>
              <div>
                <div style="font-size:16px;font-weight:700;color:var(--primary);" id="profile-username">Loading...</div>
                <div style="font-size:13px;color:var(--muted);" id="profile-role">—</div>
              </div>
            </div>

            <form id="profile-form" onsubmit="saveProfile(event)">
              <div class="form-group">
                <label class="form-label">Username</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-user form-input-icon"></i>
                  <input class="form-input has-icon" type="text" id="username" readonly style="background:#f9fafc;">
                </div>
                <p class="form-hint">Username cannot be changed.</p>
              </div>

              <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-lock form-input-icon"></i>
                  <input class="form-input has-icon" type="password" id="password" placeholder="Enter new password">
                </div>
              </div>

              <!-- Vulnerability #1: Stored XSS — bio is stored unsanitized and rendered via innerHTML -->
              <div class="form-group">
                <label class="form-label">Bio</label>
                <textarea class="form-input" id="bio" rows="4"
                  placeholder="Tell us about yourself..."></textarea>
                <p class="form-hint">Displayed on your profile page.</p>
              </div>

              <div class="form-group">
                <label class="form-label">Role</label>
                <div class="form-input-wrapper">
                  <i class="fas fa-shield-alt form-input-icon"></i>
                  <select class="form-select has-icon" id="role" disabled>
                    <option value="customer">Customer</option>
                    <option value="admin">Administrator</option>
                  </select>
                </div>
              </div>

              <!-- Bio Display — VULNERABLE: rendered with innerHTML, not textContent -->
              <div id="bio-display-wrapper" style="display:none;margin-bottom:16px;">
                <label class="form-label">Current Bio</label>
                <div id="bio-display"
                     style="padding:12px;background:#f9fafc;border:1px solid var(--border);border-radius:8px;font-size:14px;min-height:48px;">
                </div>
              </div>

              <button type="submit" id="save-btn" class="btn btn-accent btn-full btn-lg">
                <i class="fas fa-save"></i> Save Changes
              </button>
            </form>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    async function loadProfile(user) {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user_id') || user.user_id;

      if (!userId) {
        showAlert('User ID not provided!', 'danger');
        return;
      }

      try {
        const response = await fetch(`editProfile.php?user_id=${userId}`);
        const data = await response.json();

        if (response.ok) {
          document.getElementById('username').value = data.username;
          document.getElementById('role').value = data.role;
          document.getElementById('profile-username').textContent = data.username;
          document.getElementById('profile-role').textContent = data.role === 'admin' ? 'Administrator' : 'Customer';
          document.getElementById('profile-avatar').textContent = data.username.slice(0,2).toUpperCase();
        } else {
          showAlert(data.message || 'Failed to load profile data.', 'danger');
        }
      } catch (err) {
        showAlert('An error occurred while loading the profile.', 'danger');
      }
    }

    async function saveProfile(event) {
      event.preventDefault();
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user_id');
      const password = document.getElementById('password').value;
      const btn = document.getElementById('save-btn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        const response = await fetch('editProfile.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, password }),
        });
        const data = await response.json();

        if (response.ok) {
          showAlert(data.message || 'Profile updated successfully!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          showAlert(data.message || 'Failed to update profile.', 'danger');
        }
      } catch (err) {
        showAlert('An error occurred while updating the profile.', 'danger');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
      }
    }

    function showAlert(message, type) {
      const el = document.getElementById('alert-box');
      el.className = `alert alert-${type} mb-16`;
      el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i> ${message}`;
      el.style.display = 'flex';
    }

    window.onload = () => initPage(loadProfile);
  </script>
</body>
</html>
